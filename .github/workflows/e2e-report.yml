name: Deploy GitHub Pages and Run Full Selenium Report

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/selenium_tests/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Create CI env file for GitHub Pages
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PAYMENT_GATEWAY: ${{ secrets.PAYMENT_GATEWAY }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APP_REDIRECT_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: node scripts/create-ci-env.js

      - name: Build Flutter web app for GitHub Pages
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/" --dart-define-from-file=env.ci.json

      - name: Add SPA fallback for GitHub Pages routes
        run: |
          cp build/web/index.html build/web/404.html
          touch build/web/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  generate-report:
    needs: deploy-pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/selenium_tests/package-lock.json

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Selenium test dependencies
        run: npm --prefix selenium_tests ci

      - name: Wait for GitHub Pages deployment to become reachable
        env:
          PAGES_URL: ${{ needs.deploy-pages.outputs.page_url }}
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent --show-error --location "$PAGES_URL" > /tmp/pages-home.html; then
              if grep -qi "Ace Technologies" /tmp/pages-home.html; then
                exit 0
              fi
            fi
            echo "Pages URL not ready yet. Retry $attempt/20..."
            sleep 15
          done
          echo "GitHub Pages URL did not become ready in time: $PAGES_URL"
          exit 1

      - name: Run full Selenium suite against GitHub Pages
        env:
          HEADLESS: "true"
          E2E_BASE_URL: ${{ needs.deploy-pages.outputs.page_url }}
          E2E_TIMEOUT_MS: "20000"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm --prefix selenium_tests run test:all

      - name: Upload full Selenium Excel reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-full-suite-report-${{ github.run_number }}
          path: |
            frontend/selenium_tests/reports/*.xlsx
            frontend/selenium_tests/reports/evidence/**
          if-no-files-found: warn
          retention-days: 14

      - name: Publish Selenium report summary to Job Summary
        if: always()
        run: |
          latest_report=$(ls -t selenium_tests/reports/*.xlsx 2>/dev/null | head -n 1 || true)
          if [ -n "$latest_report" ]; then
            {
              echo "### Selenium full-suite report generated"
              echo ""
              echo "- Target URL: ${{ needs.deploy-pages.outputs.page_url }}"
              echo "- Report file: $(basename "$latest_report")"
              echo "- Covered suites: Functional, UI/UX, Compatibility, Performance, Security, API, Database, Accessibility, Mobile, Regression, E2E"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### WARNING: Selenium Excel report was not generated!" >> $GITHUB_STEP_SUMMARY
          fi
