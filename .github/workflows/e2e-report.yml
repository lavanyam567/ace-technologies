name: E2E Excel Report

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: e2e-report-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install Node dependencies
        run: npm ci

      - name: Create CI env file
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PAYMENT_GATEWAY: ${{ secrets.PAYMENT_GATEWAY }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          APP_REDIRECT_URL: ${{ secrets.APP_REDIRECT_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/create-ci-env.js

      - name: Build Flutter web app
        run: flutter build web --release --dart-define-from-file=env.ci.json

      - name: Run Selenium E2E suite and generate Excel report
        env:
          HEADLESS: "true"
          E2E_ASSERT_TIMEOUT_MS: "12000"
        run: npm run test:e2e

      - name: Upload E2E Excel reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-excel-report-${{ github.run_number }}
          path: |
            reports/*.xlsx
            reports/evidence/**
            TEST_SUMMARY.md
          if-no-files-found: warn
          retention-days: 14

      - name: Publish Test Summary to Job Summary
        if: always()
        run: |
          if [ -f TEST_SUMMARY.md ]; then
            cat TEST_SUMMARY.md >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ TEST_SUMMARY.md was not generated!" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Upload Specific Appium Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Ace-Technologies-Appium-TestReport-2026-06-16
          path: reports/Ace_Technologies_Appium_TestReport_2026-06-16T14-12-45-905Z.xlsx
          if-no-files-found: warn
          retention-days: 14