name: Security Pipelines Report

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  security-pipelines-report:
    runs-on: ubuntu-latest
    env:
      NODE_PATH: ${{ github.workspace }}/automated_test/node_modules
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install security report dependencies
        run: npm --prefix automated_test install

      - name: Generate web security review
        run: node automated_test/scripts/generateWebSecuritySuite.js

      - name: Generate backend security review
        run: node automated_test/scripts/generateBackendSecuritySuite.js

      - name: Generate security pipelines workbook
        run: node automated_test/scripts/generateSecurityPipelinesReport.js

      - name: Append pipeline report summary to GHA summary
        if: always()
        run: |
          echo "### Security Pipelines Workbook Generated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workbook: security-pipelines-report.xlsx" >> "$GITHUB_STEP_SUMMARY"
          echo "- Web source: automated_test/reports/web-security-findings.xlsx" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend source: automated_test/reports/findings.xlsx" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload security pipelines workbook
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-pipelines-report-${{ github.run_number }}
          path: automated_test/reports/security-pipelines-report.xlsx
