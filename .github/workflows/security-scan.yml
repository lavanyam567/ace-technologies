name: 🛡️ Security & Vulnerability Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  dependency-audit:
    name: 🔍 Package Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit Backend Dependencies
        run: |
          cd backend
          npm audit || true

      - name: Audit Frontend Dependencies
        run: |
          cd frontend
          npm audit || true

  e2e-security-tests:
    name: 🩺 E2E Security & Vulnerability Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install & Start Backend Service
        run: |
          cd backend
          npm ci
          npm run dev &
        env:
          PORT: 5000

      - name: Install & Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Start Vite Preview Server
        run: |
          cd frontend
          npx vite preview --port 5173 --host 127.0.0.1 --base /Nutrixa-frontend/ &
          echo "Waiting for Vite preview server to spin up..."
          sleep 4
          curl -I http://127.0.0.1:5173/Nutrixa-frontend/
          echo "TEST_BASE_URL=http://127.0.0.1:5173/Nutrixa-frontend" >> $GITHUB_ENV

      - name: Run E2E Security Tests
        run: |
          cd backend
          npm install
          npm run test:security
        env:
          TEST_BASE_URL: ${{ env.TEST_BASE_URL }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}

      - name: Upload Security Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-report
          path: backend/tests/security-test-report.xlsx
          retention-days: 30
