name: 🛡️ Security & Vulnerability Scan

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scans:
    name: 🩺 Simulated SAST & Security Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install xlsx --no-save || npm ci

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install xlsx --no-save || npm install

      - name: Run Web Frontend Security Suite
        run: |
          cd frontend
          node scripts/generateWebSecuritySuite.js

      - name: Run Backend Node.js Security Suite
        run: |
          cd backend
          node scripts/generateSecuritySuite.js

      - name: Append Executive Summaries to GHA Summary
        if: always()
        run: |
          echo "## Web Security" >> "$GITHUB_STEP_SUMMARY"
          cat frontend/reports/web-executive-summary.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Backend Security" >> "$GITHUB_STEP_SUMMARY"
          cat backend/reports/executive-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Append Detailed Findings to GHA Summary
        if: always()
        run: |
          echo "## Detailed Web Findings" >> "$GITHUB_STEP_SUMMARY"
          cat frontend/reports/web-security-review.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Detailed Backend Findings" >> "$GITHUB_STEP_SUMMARY"
          cat backend/reports/security-review.md >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce Zero-Critical Security Gate (Web)
        run: |
          critical_count=$(grep -oE 'Critical Findings \| [0-9]+' frontend/reports/web-executive-summary.md | grep -oE '[0-9]+' | head -n 1)
          critical_count=${critical_count:-0}
          echo "Web Critical findings detected: $critical_count"
          if [ "$critical_count" -gt 0 ]; then
            echo "Zero-Critical Security Policy violated in Frontend."
            exit 1
          fi

      - name: Enforce Zero-Critical Security Gate (Backend)
        run: |
          critical_count=$(grep -oE 'Critical Findings \| [0-9]+' backend/reports/executive-summary.md | grep -oE '[0-9]+' | head -n 1)
          critical_count=${critical_count:-0}
          echo "Backend Critical findings detected: $critical_count"
          if [ "$critical_count" -gt 0 ]; then
            echo "Zero-Critical Security Policy violated in Backend."
            exit 1
          fi

      - name: Upload Security Review Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-review-reports-${{ github.run_number }}
          path: |
            frontend/reports/web-security-findings.xlsx
            frontend/reports/web-security-review.md
            frontend/reports/web-executive-summary.md
            backend/reports/backend-findings.xlsx
            backend/reports/security-review.md
            backend/reports/dependency-report.md
            backend/reports/executive-summary.md
          retention-days: 30
