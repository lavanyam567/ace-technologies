name: Mobile Android E2E Appium Suite

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  appium-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        working-directory: android_app
        run: |
          chmod +x ./gradlew || true
          ./gradlew assembleDebug --no-daemon

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -al /dev/kvm

      - name: Run Appium Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          APK_PATH: ${{ github.workspace }}/android_app/app/build/outputs/apk/debug/app-debug.apk
        with:
          api-level: 29
          target: default
          arch: x86
          profile: pixel
          script: |
            cd frontend/appium_tests
            chmod +x scripts/ci_run_tests.sh
            ./scripts/ci_run_tests.sh

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-reports-${{ github.run_number }}
          path: |
            frontend/appium_tests/reports/latest/appium-report.xlsx
            frontend/appium_tests/reports/latest/execution-report.html
          retention-days: 14
