name: K6 Load Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  load-test:
    name: Run Load Test & Generate Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install
        # We need this to install 'xlsx' package for the report generator

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 Load Test
        run: |
          # Run the custom progress logger script
          node k6_tests/run-load-test.js

      - name: Generate XLSX Report
        run: |
          # Use your existing report generator script
          node k6_tests/generate-xlsx-report.js k6_tests/summary.json

      - name: Upload XLSX Report
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-test-report
          path: k6_tests/results/*.xlsx
          retention-days: 14
