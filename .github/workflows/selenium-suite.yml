name: Run full selenium suite against GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: selenium-suite-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  selenium-suite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Create CI env file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PAYMENT_GATEWAY: ${{ secrets.PAYMENT_GATEWAY }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          APP_REDIRECT_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: node scripts/create-ci-env.js

      - name: Build Flutter web
        run: flutter build web --release --dart-define-from-file=env.ci.json --base-href "/ace-technologies/"

      - name: Run Selenium tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          npm run test:e2e

      - name: Upload Selenium test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report-${{ github.run_number }}
          path: frontend/reports/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish Selenium test summary to Job Summary
        if: always()
        run: |
          if [ -d "reports/" ] && [ -n "$(ls -A reports/)" ]; then
            {
              echo "### Selenium test suite completed"
              echo ""
              echo "Test reports available in artifacts"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### WARNING: Selenium test reports not found!" >> "$GITHUB_STEP_SUMMARY"
          fi
