name: Android Appium Excel Report

on:
  workflow_dispatch:

concurrency:
  group: mobile-appium-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android-appium-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/appium_tests/package-lock.json

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Create CI env file for Android build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PAYMENT_GATEWAY: ${{ secrets.PAYMENT_GATEWAY }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APP_REDIRECT_URL: ace-technologies://auth-callback
        run: node scripts/create-ci-env.js

      - name: Build Flutter Android debug APK
        run: flutter build apk --debug --dart-define-from-file=env.ci.json

      - name: Install Appium suite dependencies
        run: npm --prefix appium_tests ci

      - name: Install Appium server
        run: npm install --location=global appium

      - name: Install UiAutomator2 driver
        run: appium driver install uiautomator2

      - name: Run Appium suite on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot-save -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb devices
            nohup appium --port 4723 --base-path / > appium.log 2>&1 &
            adb wait-for-device
            npm --prefix frontend/appium_tests run test:all
        env:
          APPIUM_MOCK: "false"
          APP_APK_PATH: ${{ github.workspace }}/frontend/build/app/outputs/flutter-apk/app-debug.apk
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          E2E_TIMEOUT_MS: "20000"

      - name: Upload Appium Excel reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-android-report-${{ github.run_number }}
          path: |
            frontend/appium_tests/reports/*.xlsx
            frontend/appium_tests/reports/evidence/**
            frontend/appium_tests/TEST_SUMMARY.md
            appium.log
          if-no-files-found: warn
          retention-days: 14

      - name: Publish Appium report summary to Job Summary
        if: always()
        run: |
          latest_report=$(ls -t appium_tests/reports/*.xlsx 2>/dev/null | head -n 1 || true)
          if [ -n "$latest_report" ]; then
            {
              echo "### Appium Android report generated"
              echo ""
              echo "- APK: frontend/build/app/outputs/flutter-apk/app-debug.apk"
              echo "- Report file: $(basename "$latest_report")"
              echo "- Covered suites: Functional, UI/UX, Compatibility, E2E"
              echo "- Planned cases: 301"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### WARNING: Appium Excel report was not generated!" >> "$GITHUB_STEP_SUMMARY"
          fi
