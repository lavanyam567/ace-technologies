name: Deploy And Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  frontend-security:
    runs-on: ubuntu-latest
    env:
      NODE_PATH: ${{ github.workspace }}/automated_test/node_modules
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install security report dependencies
        run: npm --prefix automated_test install

      - name: Generate web security review
        run: node automated_test/scripts/generateWebSecuritySuite.js

      - name: Build Flutter web
        run: flutter build web --release --dart-define-from-file=env.ci.json

      - name: Append frontend security summary to GHA summary
        if: always()
        run: |
          cat automated_test/reports/web-executive-summary.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat automated_test/reports/web-security-review.md >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce zero-critical security gate
        run: |
          critical_count=$(grep -oE 'Critical Findings: [0-9]+' automated_test/reports/web-executive-summary.md | grep -oE '[0-9]+' | head -n 1)
          critical_count=${critical_count:-0}
          echo "Critical findings detected: $critical_count"
          if [ "$critical_count" -gt 0 ]; then
            echo "Zero-Critical Security Policy violated."
            exit 1
          fi

      - name: Upload frontend security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-review-${{ github.run_number }}
          path: |
            automated_test/reports/web-security-findings.xlsx
            automated_test/reports/web-security-review.md
            automated_test/reports/web-executive-summary.md

      - name: Upload frontend Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-excel-${{ github.run_number }}
          path: automated_test/reports/web-security-findings.xlsx
