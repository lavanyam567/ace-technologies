name: Deploy And Test

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  frontend-security:
    runs-on: ubuntu-latest
    env:
      NODE_PATH: ${{ github.workspace }}/frontend/automated_test/node_modules
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install security report dependencies
        run: npm --prefix automated_test install

      - name: Generate web security review
        run: node automated_test/scripts/generateWebSecuritySuite.js

      - name: Create CI env file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PAYMENT_GATEWAY: ${{ secrets.PAYMENT_GATEWAY }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          APP_REDIRECT_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: node scripts/create-ci-env.js

      - name: Build Flutter web
        run: flutter build web --release --dart-define-from-file=env.ci.json --base-href "/ace-technologies/"

      - name: Append frontend security summary to GHA summary
        if: always()
        run: |
          cat automated_test/reports/web-executive-summary.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat automated_test/reports/web-security-review.md >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce zero-critical security gate
        run: |
          critical_count=$(grep -oE 'Critical Findings: [0-9]+' automated_test/reports/web-executive-summary.md | grep -oE '[0-9]+' | head -n 1)
          critical_count=${critical_count:-0}
          echo "Critical findings detected: $critical_count"
          if [ "$critical_count" -gt 0 ]; then
            echo "Zero-Critical Security Policy violated."
            exit 1
          fi

      - name: Upload frontend security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-review-${{ github.run_number }}
          path: |
            frontend/automated_test/reports/web-security-findings.xlsx
            frontend/automated_test/reports/web-security-review.md
            frontend/automated_test/reports/web-executive-summary.md

      - name: Upload frontend Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-excel-${{ github.run_number }}
          path: frontend/automated_test/reports/web-security-findings.xlsx

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build/web

  deploy-to-pages:
    needs: frontend-security
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
